name: Build AppImage

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "!**"

jobs:
  build:
    name: Build AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          libxkbcommon-dev \
          libwayland-dev \
          libdjvulibre-dev \
          libsynctex-dev \
          qt6-wayland \
          qt6-wayland-dev \
          build-essential pkgconf cmake ninja-build \
          qt6-base-dev qt6-tools-dev qt6-tools-dev-tools \
          qt6-l10n-tools \
          qt6-tools-private-dev \
          libgl1-mesa-dev libxcb-cursor0 libxcb1 \
          libfuse2 wget patchelf file

      - name: Download linuxdeploy and Qt plugin
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Configure and build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build --parallel

      - name: Install into AppDir
        run: DESTDIR=$GITHUB_WORKSPACE/AppDir cmake --install build

      - name: Set version string
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [[ "$GITHUB_REF" != refs/tags/* ]]; then
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Debug Qt Wayland plugins
        run: find /usr -name "*wayland*" -name "*.so" 2>/dev/null

      - name: Build AppImage with linuxdeploy
        env:
          OUTPUT: Lektra-${{ steps.version.outputs.version }}-x86_64.AppImage
          QMAKE: qmake6
          EXTRA_PLATFORM_PLUGINS: "libqwayland-egl.so;libqwayland-generic.so"
          EXTRA_QT_PLUGINS: "wayland-graphics-integration-client"
        run: |
          sed -i 's|^Exec=.*|Exec=lektra|' $GITHUB_WORKSPACE/AppDir/usr/share/applications/lektra.desktop
          ./linuxdeploy-x86_64.AppImage \
            --appdir $GITHUB_WORKSPACE/AppDir \
            --plugin qt \
            --output appimage

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: lektra-appimage-${{ steps.version.outputs.version }}
          path: "Lektra-*.AppImage"
          retention-days: 14
